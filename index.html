<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>マイストアパスポート</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 16px;
      color: #1c1c1c;
    }

    h1 {
      margin: 8px 0;
    }

    button,
    select,
    input,
    textarea {
      font-family: inherit;
    }

    button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #1c1c1c;
      cursor: pointer;
      min-height: 40px;
      box-sizing: border-box;
    }

    button:hover {
      background: #f7f5f2;
    }

    .top-links {
      margin: 8px 0 16px;
      text-align: center;
    }

    .top-links a {
      color: #00704a;
      text-decoration: none;
      font-size: 14px;
    }

    .top-links a:hover {
      text-decoration: underline;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
      margin: 12px 0;
    }

    input[type="text"], select {
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      min-height: 40px;
    }

    input[type="text"] {
      width: 100%;
      max-width: 360px;
    }

    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 360px;
    }

    .search-wrap input[type="text"] {
      width: 100%;
      max-width: none;
      padding-right: 40px;
    }

    .clear-search-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #999;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      min-height: auto;
      display: none;
    }

    .clear-search-btn:hover {
      color: #333;
      background: transparent;
    }

    .stats {
      margin: 10px 0;
      color: #333;
      font-size: 14px;
    }

    .store {
      padding: 12px 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .meta {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.5;
    }

    .meta a {
      color: #00704a;
      text-decoration: none;
      margin-left: 4px;
    }

    .meta a:hover {
      text-decoration: underline;
    }

    .tab-buttons {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .filter-inline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      min-height: 40px;
    }

    #totalStats {
      margin: 24px 0;
      padding: 20px 16px;
      background: #f7f5f2;
      border-radius: 14px;
      text-align: center;
    }

    #totalStats .label {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.05em;
    }

    #totalStats .count {
      font-size: 36px;
      font-weight: 600;
      margin-top: 6px;
      color: #1c1c1c;
    }

    #totalStats .sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    .nearby-wrap {
      margin: 12px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .memo-btn {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
      min-height: auto;
    }

    .memo-btn.is-empty {
      color: #ccc;
    }

    .memo-btn.has-note {
      color: #006241;
    }

    .memo-btn:hover {
      background: transparent;
    }

    .toggle-chip {
      min-width: 42px;
      padding: 6px 8px;
      font-size: 14px;
      min-height: 34px;
      border-radius: 999px;
      border: 1px solid #d7d7d7;
      background: #fff;
      color: #666;
    }

    .toggle-chip.is-active {
      border-color: #006241;
      background: #eaf6f1;
      color: #006241;
      font-weight: 600;
    }

    .store-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .memo-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 16px;
      box-sizing: border-box;
    }

    .memo-modal {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
    }

    .memo-modal h3 {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.4;
    }

    .memo-section {
      margin: 12px 0 16px;
    }

    .memo-section label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #333;
    }

    .visit-count-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .visit-count-row button {
      width: 40px;
      height: 40px;
      border: 1px solid #d9d9d9;
      background: #f7f5f2;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      color: #333;
      padding: 0;
      min-height: auto;
    }

    .visit-count-row button:hover {
      background: #efebe6;
    }

    .visit-count-row input {
      width: 96px;
      height: 40px;
      padding: 6px 8px;
      font-size: 18px;
      text-align: center;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      box-sizing: border-box;
    }

    #memoInput {
      width: 100%;
      min-height: 100px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
      resize: vertical;
    }

    .memo-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .memo-actions button.primary {
      background: #006241;
      border-color: #006241;
      color: white;
    }

    .visit-count-0 {
      color: #bbb;
    }

    .visit-count-low {
      color: #666;
    }

    .visit-count-mid {
      color: #333;
      font-weight: 500;
    }

    .visit-count-high {
      color: #006241;
      font-weight: 600;
    }

    .visit-count-super {
      color: #ffae00;
      font-weight: 800;
    }

    .check-filters {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #mapSection {
      display: none;
      margin: 12px 0;
    }

    #storeMap {
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
    }

    .nearby-store-row {
      cursor: pointer;
    }

    .map-popup {
      min-width: 240px;
    }

    .map-popup-title {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .map-popup-meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .map-popup-row {
      margin: 8px 0;
    }

    .map-popup-row label {
      display: block;
      font-size: 12px;
      color: #333;
      margin-bottom: 4px;
    }

    .map-popup-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .map-popup-count {
      width: 100%;
      height: 36px;
      padding: 6px 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .map-popup-memo {
      width: 100%;
      min-height: 72px;
      padding: 8px;
      font-size: 13px;
      box-sizing: border-box;
      resize: vertical;
    }

    .map-popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .map-popup-actions button,
    .map-popup-actions a {
      flex: 1;
      text-align: center;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
      box-sizing: border-box;
    }

    .map-popup-save-btn {
      border: 1px solid #006241;
      background: #006241;
      color: #fff;
      cursor: pointer;
    }

    .map-popup-link-btn {
      border: 1px solid #ddd;
      background: #fff;
      color: #00704a;
    }

    .current-location-popup {
      font-size: 12px;
    }

    .current-location-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2f80ed;
      border: 3px solid #ffffff;
      box-shadow: 0 0 0 2px rgba(47, 128, 237, 0.25);
    }

    .legal-footer {
      margin-top: 40px;
      padding: 20px 8px 8px;
      font-size: 12px;
      line-height: 1.8;
      color: #888;
      text-align: center;
      border-top: 1px solid #eee;
    }

    @media (max-width: 640px) {
      body {
        margin: 12px;
      }

      .toolbar > * {
        width: 100%;
      }

      .search-wrap,
      input[type="text"],
      select {
        max-width: none;
      }

      .store-actions {
        gap: 6px;
      }

      .toggle-chip {
        min-width: 38px;
        font-size: 13px;
      }

      .map-popup {
        min-width: 220px;
      }
    }
  </style>
</head>
<body>
  <h1>マイストアパスポート</h1>

  <div class="top-links">
    <a href="https://store.starbucks.co.jp/" target="_blank" rel="noopener noreferrer">
      スターバックス公式 店舗検索
    </a>
  </div>

  <div class="nearby-wrap">
    <button id="findNearby">近くの店舗</button>
    <button id="toggleMapBtn">地図で見る</button>
    <button id="exportDataBtn">エクスポート</button>
    <button id="importDataBtn">インポート</button>
    <input id="importFileInput" type="file" accept=".json,application/json" style="display:none;">
  </div>

  <div id="nearbyResults" style="margin: 12px 0;"></div>

  <div id="mapSection">
    <div id="storeMap"></div>
  </div>

  <div class="tab-buttons">
    <button id="tabOpen">店舗一覧</button>
    <button id="tabClosed">閉店店舗一覧</button>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="店舗名で検索（例：渋谷 / 蔦屋書店）">
      <button id="clearSearchBtn" type="button" class="clear-search-btn" aria-label="検索文字をクリア">×</button>
    </div>

    <select id="searchMode">
      <option value="name">店舗名検索</option>
      <option value="keyword">キーワード検索</option>
    </select>

    <select id="prefFilter">
      <option value="">都道府県（すべて）</option>
    </select>

    <select id="sortMode">
      <option value="default">並び替えなし</option>
      <option value="visitDesc">訪問回数が多い順</option>
      <option value="unvisitedFirst">未訪問優先</option>
      <option value="nameAsc">店名順</option>
    </select>

    <div class="check-filters">
      <label class="filter-inline">
        <input type="checkbox" id="visitedOnly">
        訪問済みのみ
      </label>

      <label class="filter-inline">
        <input type="checkbox" id="unvisitedOnly">
        未訪問のみ
      </label>

      <label class="filter-inline">
        <input type="checkbox" id="memoOnly">
        メモありのみ
      </label>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div id="totalStats"></div>
  <div id="list"></div>

  <div id="memoModal" class="memo-modal-overlay">
    <div class="memo-modal">
      <h3 id="modalTitle"></h3>

      <div class="memo-section">
        <label for="visitCountInput">訪問回数</label>
        <div class="visit-count-row">
          <button id="minusBtn" type="button">−</button>
          <input id="visitCountInput" type="number" min="0" max="2000">
          <button id="plusBtn" type="button">＋</button>
        </div>
      </div>

      <div class="memo-section">
        <label for="memoInput">メモ</label>
        <textarea id="memoInput"></textarea>
      </div>

      <div class="memo-actions">
        <button id="closeMemo" type="button">閉じる</button>
        <button id="saveMemo" type="button" class="primary">保存</button>
      </div>
    </div>
  </div>

  <footer class="legal-footer">
    本サービスはスターバックス公式とは関係ありません。<br>
    位置情報は端末内でのみ利用されます。<br>
    店舗情報は公開されている事実情報をもとに整理しています。
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const KEY = "visited_storeid_v1";
    const NOTE_KEY = "store_notes_v1";
    const FAV_KEY = "favorite_storeid_v1";
    const WANT_KEY = "want_to_go_storeid_v1";

    let stores = [];
    let visited = JSON.parse(localStorage.getItem(KEY) || "{}");
    let storeNotes = JSON.parse(localStorage.getItem(NOTE_KEY) || "{}");
    let favorites = JSON.parse(localStorage.getItem(FAV_KEY) || "{}");
    let wantToGo = JSON.parse(localStorage.getItem(WANT_KEY) || "{}");

    let currentTab = "open";
    let isNearbyOpen = false;
    let currentMemoStoreId = null;
    let currentNearbyCoords = null;

    let isMapOpen = false;
    let map = null;
    let mapLayer = null;
    let markerMap = {};
    let currentLocationMarker = null;
    let currentLocationCircle = null;
    let lastOpenedPopupStoreId = null;
    let suppressNextPopupCloseReset = false;

    const search = document.getElementById("search");
    const searchMode = document.getElementById("searchMode");
    const prefFilter = document.getElementById("prefFilter");
    const sortMode = document.getElementById("sortMode");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const visitedOnly = document.getElementById("visitedOnly");
    const unvisitedOnly = document.getElementById("unvisitedOnly");
    const memoOnly = document.getElementById("memoOnly");
    const exportDataBtn = document.getElementById("exportDataBtn");
    const importDataBtn = document.getElementById("importDataBtn");
    const importFileInput = document.getElementById("importFileInput");
    const toggleMapBtn = document.getElementById("toggleMapBtn");
    const mapSection = document.getElementById("mapSection");

    const list = document.getElementById("list");
    const stats = document.getElementById("stats");
    const totalStats = document.getElementById("totalStats");

    const tabOpen = document.getElementById("tabOpen");
    const tabClosed = document.getElementById("tabClosed");
    const findNearby = document.getElementById("findNearby");
    const nearbyResults = document.getElementById("nearbyResults");

    const memoModal = document.getElementById("memoModal");
    const modalTitle = document.getElementById("modalTitle");
    const visitCountInput = document.getElementById("visitCountInput");
    const memoInput = document.getElementById("memoInput");
    const minusBtn = document.getElementById("minusBtn");
    const plusBtn = document.getElementById("plusBtn");
    const closeMemo = document.getElementById("closeMemo");
    const saveMemoBtn = document.getElementById("saveMemo");

    function save() {
      localStorage.setItem(KEY, JSON.stringify(visited));
    }

    function saveNotes() {
      localStorage.setItem(NOTE_KEY, JSON.stringify(storeNotes));
    }

    function saveFavorites() {
      localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
    }

    function saveWantToGo() {
      localStorage.setItem(WANT_KEY, JSON.stringify(wantToGo));
    }

    function updateClearSearchBtn() {
      clearSearchBtn.style.display = search.value.trim() === "" ? "none" : "block";
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(ch) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        };
        return map[ch];
      });
    }

    function saveStoreData(storeId, isVisited, visitCount, memoText) {
      const safeVisited = !!isVisited;
      const safeCount = Math.min(2000, Math.max(0, Number(visitCount || 0)));
      const safeMemo = String(memoText || "").trim();

      visited[storeId] = safeVisited;

      if (safeCount === 0 && safeMemo === "") {
        delete storeNotes[storeId];
      } else {
        storeNotes[storeId] = {
          visitCount: safeCount,
          memo: safeMemo
        };
      }

      if (safeVisited) {
        const existing = storeNotes[storeId];
        const existingCount = existing && existing.visitCount ? Number(existing.visitCount) : 0;

        if (existingCount < 1) {
          storeNotes[storeId] = {
            visitCount: 1,
            memo: existing && existing.memo ? existing.memo : ""
          };
        }
      }

      save();
      saveNotes();
    }

    function toggleFavorite(storeId) {
      favorites[storeId] = !favorites[storeId];
      saveFavorites();
    }

    function toggleWantToGo(storeId) {
      wantToGo[storeId] = !wantToGo[storeId];
      saveWantToGo();
    }

    function updateCurrentLocationMarker() {
      if (!map) return;

      if (currentLocationMarker) {
        map.removeLayer(currentLocationMarker);
        currentLocationMarker = null;
      }

      if (currentLocationCircle) {
        map.removeLayer(currentLocationCircle);
        currentLocationCircle = null;
      }

      if (!currentNearbyCoords) return;

      const latlng = [currentNearbyCoords.lat, currentNearbyCoords.lng];

      const currentLocationIcon = L.divIcon({
        className: "",
        html: `<div class="current-location-dot"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });

      currentLocationMarker = L.marker(latlng, {
        icon: currentLocationIcon,
        zIndexOffset: 1000
      }).addTo(map);

      currentLocationMarker.bindPopup(`
        <div class="current-location-popup">現在地</div>
      `);

      currentLocationCircle = L.circle(latlng, {
        radius: 120,
        color: "#2f80ed",
        fillColor: "#2f80ed",
        fillOpacity: 0.12,
        weight: 1
      }).addTo(map);
    }

    function requestCurrentLocation(options = {}) {
      const { centerMap = false } = options;

      if (!navigator.geolocation) {
        return;
      }

      navigator.geolocation.getCurrentPosition(
        position => {
          const userLat = position.coords.latitude;
          const userLng = position.coords.longitude;

          currentNearbyCoords = { lat: userLat, lng: userLng };

          if (isNearbyOpen) {
            renderNearbyStores(userLat, userLng);
          }

          if (isMapOpen) {
            updateCurrentLocationMarker();

            if (centerMap && map) {
              map.setView([userLat, userLng], 14);
            }
          }
        },
        error => {
          console.error("位置情報の取得に失敗しました", error);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 300000
        }
      );
    }

    function exportData() {
      const exportObj = {
        visited,
        storeNotes,
        favorites,
        wantToGo,
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob(
        [JSON.stringify(exportObj, null, 2)],
        { type: "application/json" }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "my-store-passport-data.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();

      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);

          if (imported.visited && typeof imported.visited === "object") {
            visited = imported.visited;
            localStorage.setItem(KEY, JSON.stringify(visited));
          }

          if (imported.storeNotes && typeof imported.storeNotes === "object") {
            storeNotes = imported.storeNotes;
            localStorage.setItem(NOTE_KEY, JSON.stringify(storeNotes));
          }

          if (imported.favorites && typeof imported.favorites === "object") {
            favorites = imported.favorites;
            localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
          }

          if (imported.wantToGo && typeof imported.wantToGo === "object") {
            wantToGo = imported.wantToGo;
            localStorage.setItem(WANT_KEY, JSON.stringify(wantToGo));
          }

          render();
          alert("データを読み込みました");
        } catch (err) {
          alert("JSONの読み込みに失敗しました");
          console.error(err);
        }
      };

      reader.readAsText(file);
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const header = splitCSVLine(lines.shift()).map(h => h.trim());

      const idx = {
        store_id: header.indexOf("store_id"),
        name: header.indexOf("name"),
        pref: header.indexOf("pref"),
        city: header.indexOf("city"),
        address: header.indexOf("address"),
        lat: header.indexOf("lat"),
        lng: header.indexOf("lng"),
        status: header.indexOf("status")
      };

      return lines
        .map(splitCSVLine)
        .map(cols => ({
          store_id: (cols[idx.store_id] || "").trim(),
          name: (cols[idx.name] || "").trim(),
          pref: (cols[idx.pref] || "").trim(),
          city: (cols[idx.city] || "").trim(),
          address: (cols[idx.address] || "").trim(),
          lat: (cols[idx.lat] || "").trim(),
          lng: (cols[idx.lng] || "").trim(),
          status: (cols[idx.status] || "open").trim().toLowerCase()
        }))
        .filter(s => s.name !== "");
    }

    function getDistanceKm(lat1, lng1, lat2, lng2) {
      const toRad = deg => deg * Math.PI / 180;
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function getStoreMapLink(store) {
      if (store.lat && store.lng) {
        return `https://www.google.com/maps?q=${store.lat},${store.lng}`;
      }

      const fullAddress = `${store.pref}${store.city}${store.address}`;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(fullAddress)}`;
    }

    function renderNearbyStores(userLat, userLng) {
      nearbyResults.innerHTML = "";

      const candidates = stores
        .filter(s => s.status === "open" && s.lat && s.lng)
        .map(s => ({
          ...s,
          distance: getDistanceKm(
            Number(userLat),
            Number(userLng),
            Number(s.lat),
            Number(s.lng)
          )
        }))
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 5);

      if (candidates.length === 0) {
        nearbyResults.innerHTML = "<p>近くの店舗を表示できませんでした（lat/lng未設定の可能性があります）。</p>";
        return;
      }

      const title = document.createElement("h3");
      title.textContent = "近くの店舗";
      nearbyResults.appendChild(title);

      candidates.forEach(store => {
        const row = document.createElement("div");
        row.className = "store nearby-store-row";

        const top = document.createElement("div");
        top.style.display = "flex";
        top.style.justifyContent = "space-between";
        top.style.alignItems = "center";
        top.style.gap = "12px";

        const left = document.createElement("div");

        const name = document.createElement("div");
        name.textContent = store.name;
        left.appendChild(name);

        const distance = document.createElement("div");
        distance.className = "meta";

        const noteData = storeNotes[store.store_id];
        const visitCount = noteData && noteData.visitCount ? Number(noteData.visitCount) : 0;
        const visitedLabel = visited[store.store_id] === true ? "訪問済み" : "未訪問";

        distance.textContent = `${store.distance.toFixed(2)} km / ${visitedLabel} / ${visitCount}回`;
        left.appendChild(distance);

        top.appendChild(left);
        row.appendChild(top);

        row.addEventListener("click", () => {
          searchMode.value = "name";
          search.value = store.name;
          prefFilter.value = "";

          nearbyResults.innerHTML = "";
          isNearbyOpen = false;

          render();
        });

        nearbyResults.appendChild(row);
      });
    }

    function ensureMap() {
      if (map) return;

      map = L.map("storeMap");
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      map.setView([35.681236, 139.767125], 5);

      map.on("popupopen", (e) => {
        const popupEl = e.popup.getElement();
        if (!popupEl) return;

        const wrap = popupEl.querySelector(".map-popup");
        if (!wrap) return;

        const storeId = wrap.dataset.storeId;
        const visitedInput = wrap.querySelector(".map-popup-visited");
        const countInput = wrap.querySelector(".map-popup-count");
        const memoTextarea = wrap.querySelector(".map-popup-memo");
        const saveBtn = wrap.querySelector(".map-popup-save-btn");

        if (!storeId || !visitedInput || !countInput || !memoTextarea || !saveBtn) return;

        lastOpenedPopupStoreId = storeId;

        visitedInput.addEventListener("change", () => {
          const currentCount = Math.min(2000, Math.max(0, Number(countInput.value || 0)));
          if (visitedInput.checked && currentCount < 1) {
            countInput.value = 1;
          }
        });

        saveBtn.addEventListener("click", () => {
          const isVisited = visitedInput.checked;
          const visitCount = Math.min(2000, Math.max(0, Number(countInput.value || 0)));
          const memoText = memoTextarea.value;

          saveStoreData(storeId, isVisited, visitCount, memoText);

          suppressNextPopupCloseReset = true;
          lastOpenedPopupStoreId = storeId;
          render();
        });
      });

      map.on("popupclose", (e) => {
        if (suppressNextPopupCloseReset) {
          suppressNextPopupCloseReset = false;
          return;
        }

        const popupEl = e.popup.getElement();
        if (!popupEl) return;

        const wrap = popupEl.querySelector(".map-popup");
        if (!wrap) return;

        if (lastOpenedPopupStoreId === wrap.dataset.storeId) {
          lastOpenedPopupStoreId = null;
        }
      });
    }

    function renderMapStores(shouldFit = false) {
      if (!isMapOpen) return;

      ensureMap();

      if (mapLayer) {
        map.removeLayer(mapLayer);
      }

      markerMap = {};
      mapLayer = L.layerGroup();

      const q = search.value.trim().toLowerCase();

      let mapStores = stores.filter(s => {
        let matchSearch = true;

        if (q !== "") {
          if (searchMode.value === "name") {
            matchSearch = s.name.toLowerCase().includes(q);
          } else {
            const keywordTarget = `${s.name} ${s.pref} ${s.city} ${s.address}`.toLowerCase();
            matchSearch = keywordTarget.includes(q);
          }
        }

        const matchPref = prefFilter.value === "" || s.pref === prefFilter.value;
        const matchStatus = s.status === currentTab;

        const isVisited = visited[s.store_id] === true;
        const noteData = storeNotes[s.store_id];
        const hasMemo = noteData && noteData.memo && noteData.memo.trim() !== "";

        const matchVisited = visitedOnly.checked ? isVisited : true;
        const matchUnvisited = unvisitedOnly.checked ? !isVisited : true;
        const matchMemo = memoOnly.checked ? hasMemo : true;

        return matchSearch && matchPref && matchStatus && matchVisited && matchUnvisited && matchMemo;
      });

      mapStores = mapStores.filter(s => s.lat && s.lng);

      const bounds = [];

      mapStores.forEach(store => {
        const lat = Number(store.lat);
        const lng = Number(store.lng);
        const noteData = storeNotes[store.store_id];
        const visitCount = noteData && noteData.visitCount ? Number(noteData.visitCount) : 0;
        const memoText = noteData && noteData.memo ? noteData.memo : "";
        const isVisited = visited[store.store_id] === true;

        let color = "#999";
        if (store.status === "closed") {
          color = "#c44";
        } else if (isVisited) {
          color = "#006241";
        }

        const marker = L.circleMarker([lat, lng], {
          radius: 7,
          color,
          fillColor: color,
          fillOpacity: 0.85,
          weight: 1
        });

        const mapLink = getStoreMapLink(store);
        const escapedName = escapeHtml(store.name);
        const escapedPref = escapeHtml(store.pref);
        const escapedCity = escapeHtml(store.city);
        const escapedAddress = escapeHtml(store.address);
        const escapedMemo = escapeHtml(memoText);

        marker.bindPopup(`
          <div class="map-popup" data-store-id="${store.store_id}">
            <div class="map-popup-title">${escapedName}</div>

            <div class="map-popup-meta">
              ${escapedPref} ${escapedCity}<br>
              ${escapedAddress}
            </div>

            <div class="map-popup-row">
              <label class="map-popup-check">
                <input type="checkbox" class="map-popup-visited" ${isVisited ? "checked" : ""}>
                訪問済みにする
              </label>
            </div>

            <div class="map-popup-row">
              <label>訪問回数</label>
              <input
                type="number"
                min="0"
                max="2000"
                class="map-popup-count"
                value="${visitCount}"
              >
            </div>

            <div class="map-popup-row">
              <label>メモ</label>
              <textarea class="map-popup-memo">${escapedMemo}</textarea>
            </div>

            <div class="map-popup-actions">
              <button type="button" class="map-popup-save-btn">保存</button>
              <a href="${mapLink}" target="_blank" rel="noopener noreferrer" class="map-popup-link-btn">Googleマップ</a>
            </div>
          </div>
        `);

        marker.addTo(mapLayer);
        markerMap[store.store_id] = marker;
        bounds.push([lat, lng]);
      });

      mapLayer.addTo(map);

      updateCurrentLocationMarker();

      if (shouldFit) {
        const fitTargets = [...bounds];

        if (currentNearbyCoords) {
          fitTargets.push([currentNearbyCoords.lat, currentNearbyCoords.lng]);
        }

        if (fitTargets.length > 1) {
          map.fitBounds(fitTargets, { padding: [20, 20] });
        } else if (fitTargets.length === 1) {
          map.setView(fitTargets[0], currentNearbyCoords ? 14 : 16);
        } else {
          map.setView([35.681236, 139.767125], 5);
        }
      }

      setTimeout(() => {
        map.invalidateSize();

        if (lastOpenedPopupStoreId && markerMap[lastOpenedPopupStoreId]) {
          markerMap[lastOpenedPopupStoreId].openPopup();
        }
      }, 0);
    }

    function openMemoModal(store) {
      currentMemoStoreId = store.store_id;
      modalTitle.textContent = store.name;

      const data = storeNotes[store.store_id] || {};
      visitCountInput.value = data.visitCount ?? 0;
      memoInput.value = data.memo || "";

      memoModal.style.display = "flex";
    }

    function closeMemoModal() {
      memoModal.style.display = "none";
      currentMemoStoreId = null;
    }

    function render() {
      updateClearSearchBtn();

      const q = search.value.trim().toLowerCase();
      list.innerHTML = "";

      const baseFiltered = stores.filter(s => {
        let matchSearch = true;

        if (q !== "") {
          if (searchMode.value === "name") {
            matchSearch = s.name.toLowerCase().includes(q);
          } else {
            const keywordTarget = `${s.name} ${s.pref} ${s.city} ${s.address}`.toLowerCase();
            matchSearch = keywordTarget.includes(q);
          }
        }

        const matchPref = prefFilter.value === "" || s.pref === prefFilter.value;
        const matchStatus = s.status === currentTab;

        return matchSearch && matchPref && matchStatus;
      });

      const done = baseFiltered.filter(s => visited[s.store_id] === true).length;
      const total = baseFiltered.length;
      const percent = total > 0 ? Math.round((done / total) * 100) : 0;

      stats.textContent = `進捗：${done} / ${total} 店舗（${percent}%）`;

      const totalVisitedCount = Object.values(visited).filter(Boolean).length;
      totalStats.innerHTML = `
        <div class="label">総スタンプ数</div>
        <div class="count">${totalVisitedCount}</div>
        <div class="sub">stores visited</div>
      `;

      let filtered = baseFiltered.filter(s => {
        const isVisited = visited[s.store_id] === true;
        const noteData = storeNotes[s.store_id];
        const hasMemo = noteData && noteData.memo && noteData.memo.trim() !== "";

        const matchVisited = visitedOnly.checked ? isVisited : true;
        const matchUnvisited = unvisitedOnly.checked ? !isVisited : true;
        const matchMemo = memoOnly.checked ? hasMemo : true;

        return matchVisited && matchUnvisited && matchMemo;
      });

      if (sortMode.value === "default") {
        filtered.sort((a, b) => {
          const aFavorite = a.status !== "closed" && favorites[a.store_id] ? 1 : 0;
          const bFavorite = b.status !== "closed" && favorites[b.store_id] ? 1 : 0;

          if (bFavorite !== aFavorite) {
            return bFavorite - aFavorite;
          }

          const aWant = a.status !== "closed" && wantToGo[a.store_id] ? 1 : 0;
          const bWant = b.status !== "closed" && wantToGo[b.store_id] ? 1 : 0;

          if (bWant !== aWant) {
            return bWant - aWant;
          }

          return a.name.localeCompare(b.name, "ja");
        });
      } else if (sortMode.value === "visitDesc") {
        filtered.sort((a, b) => {
          const aCount = storeNotes[a.store_id] && storeNotes[a.store_id].visitCount
            ? Number(storeNotes[a.store_id].visitCount)
            : 0;
          const bCount = storeNotes[b.store_id] && storeNotes[b.store_id].visitCount
            ? Number(storeNotes[b.store_id].visitCount)
            : 0;
          return bCount - aCount;
        });
      } else if (sortMode.value === "unvisitedFirst") {
        filtered.sort((a, b) => {
          const aVisited = visited[a.store_id] === true ? 1 : 0;
          const bVisited = visited[b.store_id] === true ? 1 : 0;
          return aVisited - bVisited;
        });
      } else if (sortMode.value === "nameAsc") {
        filtered.sort((a, b) => a.name.localeCompare(b.name, "ja"));
      }

      filtered.forEach(s => {
        const row = document.createElement("div");
        row.className = "store";

        const title = document.createElement("div");
        title.style.display = "flex";
        title.style.justifyContent = "space-between";
        title.style.alignItems = "flex-start";
        title.style.gap = "12px";

        const noteData = storeNotes[s.store_id];
        const hasMemo = noteData && noteData.memo && noteData.memo.trim() !== "";
        const visitCount = noteData && noteData.visitCount ? Number(noteData.visitCount) : 0;

        const left = document.createElement("div");
        left.style.minWidth = "0";
        left.style.flex = "1";

        const storeName = document.createElement("div");
        storeName.textContent = s.name;
        left.appendChild(storeName);

        const visitCountLabel = document.createElement("div");
        visitCountLabel.className = "meta";
        visitCountLabel.textContent = `${visitCount}回`;

        if (visitCount === 0) {
          visitCountLabel.classList.add("visit-count-0");
        } else if (visitCount < 10) {
          visitCountLabel.classList.add("visit-count-low");
        } else if (visitCount < 100) {
          visitCountLabel.classList.add("visit-count-mid");
        } else if (visitCount < 1000) {
          visitCountLabel.classList.add("visit-count-high");
        } else {
          visitCountLabel.classList.add("visit-count-super");
        }

        left.appendChild(visitCountLabel);

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = visited[s.store_id] === true;
        cb.title = "訪問済み";

        cb.addEventListener("change", (e) => {
          e.stopPropagation();

          const existing = storeNotes[s.store_id] || {};
          const existingCount = existing.visitCount ? Number(existing.visitCount) : 0;
          const existingMemo = existing.memo || "";

          saveStoreData(
            s.store_id,
            cb.checked,
            existingCount,
            existingMemo
          );

          render();
        });

        const memoBtn = document.createElement("button");
        memoBtn.type = "button";
        memoBtn.className = `memo-btn ${hasMemo ? "has-note" : "is-empty"}`;
        memoBtn.textContent = "✎";
        memoBtn.title = "メモ";

        memoBtn.onclick = (e) => {
          e.stopPropagation();
          openMemoModal(s);
        };

        let favBtn = null;
        let wantBtn = null;

        if (s.status !== "closed") {
          favBtn = document.createElement("button");
          favBtn.type = "button";
          favBtn.className = `toggle-chip ${favorites[s.store_id] ? "is-active" : ""}`;
          favBtn.textContent = favorites[s.store_id] ? "★" : "☆";
          favBtn.title = "お気に入り";

          favBtn.onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(s.store_id);
            render();
          };

          wantBtn = document.createElement("button");
          wantBtn.type = "button";
          wantBtn.className = `toggle-chip ${wantToGo[s.store_id] ? "is-active" : ""}`;
          wantBtn.textContent = wantToGo[s.store_id] ? "行きたい済" : "行きたい";
          wantBtn.title = "行きたい";

          wantBtn.onclick = (e) => {
            e.stopPropagation();
            toggleWantToGo(s.store_id);
            render();
          };
        }

        const right = document.createElement("div");
        right.className = "store-actions";

        if (favBtn) {
          right.appendChild(favBtn);
        }

        if (wantBtn) {
          right.appendChild(wantBtn);
        }

        right.appendChild(memoBtn);
        right.appendChild(cb);

        title.appendChild(left);
        title.appendChild(right);

        const meta = document.createElement("div");
        meta.className = "meta";

        const mapLink = getStoreMapLink(s);
        const favoriteLabel = s.status !== "closed" && favorites[s.store_id] ? " / お気に入り" : "";
        const wantLabel = s.status !== "closed" && wantToGo[s.store_id] ? " / 行きたい" : "";
        meta.innerHTML = `${s.pref} ${s.city} / ${s.address}${favoriteLabel}${wantLabel} / <a href="${mapLink}" target="_blank" rel="noopener noreferrer">Googleマップ</a>`;

        row.addEventListener("click", (e) => {
          if (
            e.target.tagName === "INPUT" ||
            e.target.tagName === "BUTTON" ||
            e.target.tagName === "A"
          ) {
            return;
          }

          if (!isMapOpen) {
            mapSection.style.display = "block";
            isMapOpen = true;
            renderMapStores(true);
            requestCurrentLocation({ centerMap: false });
          }

          const marker = markerMap[s.store_id];
          if (marker) {
            lastOpenedPopupStoreId = s.store_id;
            const latlng = marker.getLatLng();
            map.setView(latlng, 16);
            marker.openPopup();
          }
        });

        row.appendChild(title);
        row.appendChild(meta);
        list.appendChild(row);
      });

      if (isMapOpen) {
        renderMapStores(false);
      }
    }

    async function main() {
      const res = await fetch("./stores.csv");
      const text = await res.text();
      stores = parseCSV(text);

      const prefOrder = [
        "北海道",
        "青森県","岩手県","宮城県","秋田県","山形県","福島県",
        "茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県",
        "新潟県","富山県","石川県","福井県","山梨県","長野県",
        "岐阜県","静岡県","愛知県","三重県",
        "滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県",
        "鳥取県","島根県","岡山県","広島県","山口県",
        "徳島県","香川県","愛媛県","高知県",
        "福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県",
        "沖縄県"
      ];

      const prefs = prefOrder.filter(p => stores.some(s => s.pref === p));

      prefs.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        prefFilter.appendChild(opt);
      });

      search.addEventListener("input", () => {
        updateClearSearchBtn();
        render();
      });

      clearSearchBtn.addEventListener("click", () => {
        search.value = "";
        updateClearSearchBtn();
        render();
        search.focus();
      });

      searchMode.addEventListener("change", () => {
        if (searchMode.value === "name") {
          search.placeholder = "店舗名で検索（例：渋谷 / 蔦屋書店）";
        } else {
          search.placeholder = "キーワードで検索（例：札幌 / 大学 / 東京駅）";
        }
        render();
      });

      prefFilter.addEventListener("change", render);
      sortMode.addEventListener("change", render);
      visitedOnly.addEventListener("change", render);
      unvisitedOnly.addEventListener("change", render);
      memoOnly.addEventListener("change", render);

      exportDataBtn.addEventListener("click", exportData);

      importDataBtn.addEventListener("click", () => {
        importFileInput.click();
      });

      importFileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        importData(file);
        importFileInput.value = "";
      });

      findNearby.addEventListener("click", () => {
        if (isNearbyOpen) {
          nearbyResults.innerHTML = "";
          isNearbyOpen = false;
          currentNearbyCoords = null;

          if (isMapOpen) {
            updateCurrentLocationMarker();
          }
          return;
        }

        if (!navigator.geolocation) {
          nearbyResults.innerHTML = "<p>このブラウザでは位置情報が使えません。</p>";
          return;
        }

        nearbyResults.innerHTML = "<p>現在地を取得中...</p>";

        navigator.geolocation.getCurrentPosition(
          position => {
            const userLat = position.coords.latitude;
            const userLng = position.coords.longitude;

            currentNearbyCoords = { lat: userLat, lng: userLng };
            renderNearbyStores(userLat, userLng);
            isNearbyOpen = true;

            if (isMapOpen) {
              updateCurrentLocationMarker();
            }
          },
          error => {
            nearbyResults.innerHTML = "<p>位置情報を取得できませんでした。位置情報の許可を確認してください。</p>";
            console.error(error);
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 300000
          }
        );
      });

      toggleMapBtn.addEventListener("click", () => {
        if (isMapOpen) {
          mapSection.style.display = "none";
          isMapOpen = false;
          lastOpenedPopupStoreId = null;
          return;
        }

        mapSection.style.display = "block";
        isMapOpen = true;
        renderMapStores(true);
        requestCurrentLocation({ centerMap: false });
      });

      tabOpen.addEventListener("click", () => {
        currentTab = "open";
        render();
      });

      tabClosed.addEventListener("click", () => {
        currentTab = "closed";
        render();
      });

      minusBtn.onclick = () => {
        const current = Number(visitCountInput.value || 0);
        visitCountInput.value = Math.max(0, current - 1);
      };

      plusBtn.onclick = () => {
        const current = Number(visitCountInput.value || 0);
        visitCountInput.value = Math.min(2000, current + 1);
      };

      closeMemo.onclick = () => {
        closeMemoModal();
      };

      saveMemoBtn.onclick = () => {
        if (!currentMemoStoreId) return;

        const count = Math.min(2000, Math.max(0, Number(visitCountInput.value || 0)));
        const memoText = memoInput.value.trim();
        const isVisited = visited[currentMemoStoreId] === true;

        saveStoreData(currentMemoStoreId, isVisited, count, memoText);

        closeMemoModal();
        render();
      };

      memoModal.addEventListener("click", (e) => {
        if (e.target === memoModal) {
          closeMemoModal();
        }
      });

      render();
    }

    main().catch(err => {
      stats.textContent = "CSV読み込みエラー";
      list.innerHTML = `<pre style="white-space:pre-wrap">${String(err)}</pre>`;
    });
  </script>
</body>
</html>
